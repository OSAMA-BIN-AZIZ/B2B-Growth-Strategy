version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: b2b_growth
      POSTGRES_USER: b2b
      POSTGRES_PASSWORD: b2b123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b -d b2b_growth"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://b2b:b2b123@postgres:5432/b2b_growth
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_APPSECRET: ${WECHAT_APPSECRET:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
